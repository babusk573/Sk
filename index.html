
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Human Service AI</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 0; }
        header { background: #1a73e8; color: white; padding: 20px; text-align: center; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .chat-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 25px; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
        #output { margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 10px; line-height: 1.6; min-height: 100px; }
    </style>
</head>
<body>
    <header>🌍 গ্লোবাল AI সাহায্যকারী</header>
    <div class="container">
        <div class="chat-box">
            <h3>যেকোনো প্রশ্ন করুন (ডাক্তার, মিস্ত্রি বা শিক্ষা):</h3>
            <input type="text" id="userInput" placeholder="এখানে লিখুন...">
            <button onclick="askAI()">জানতে চাই</button>
            <div id="output">আপনার উত্তরের জন্য অপেক্ষা করছি...</div>
        </div>
    </div>

<script>
    async function askAI() {
        const prompt = document.getElementById('userInput').value;
        const output = document.getElementById('output');
        
        // ৩৪ নম্বর লাইনে আপনার API Key টি বসান
        const apiKey = " AIzaSyDt2-ipGFlbixb99AlukYjV-loaSTS42Rg

        if (!prompt) return alert("কিছু লিখুন!");
        output.innerText = "AI সারা বিশ্বের তথ্য খুঁজছে...";

        try {
            const response = await fetch(`https://googleapis.com{apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: "তুমি একজন সমাজসেবক বিশেষজ্ঞ। স্বাস্থ্য, শিক্ষা এবং মিস্ত্রি কাজের তথ্য দাও। প্রশ্ন: " + prompt }] }] })
            });
            const data = await response.json();
            output.innerText = data.candidates[0].content.parts[0].text;
        } catch (error) {
            output.innerText = "দুঃখিত, কোনো সমস্যা হয়েছে। আপনার API Key কি সঠিক?";
        }
    }
</script>
</body>
</html>
