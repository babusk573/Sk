<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Human Service</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; line-height: 1.6; background-color: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .chat-container { position: fixed; bottom: 20px; right: 20px; width: 300px; border: 1px solid #ccc; border-radius: 10px; background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .chat-header { background: #007bff; color: white; padding: 10px; border-radius: 10px 10px 0 0; }
        .chat-box { height: 200px; overflow-y: auto; padding: 10px; font-size: 14px; border-bottom: 1px solid #eee; }
        .chat-input { display: flex; padding: 10px; }
        input { flex: 1; padding: 5px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #28a745; color: white; border: none; padding: 5px 10px; margin-left: 5px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gulabi Babu - Global Human Service</h1>
        <p>মানুষের সেবায় আমরা সবসময় আপনার পাশে।</p>
        <hr>
        <h3>আমাদের সেবাসমূহ:</h3>
        <ul>
            <li><b>স্বাস্থ্য:</b> ডাক্তার ও নার্সিং হোম সহায়তা।</li>
            <li><b>শিক্ষা:</b> স্কুল-কলেজ ভর্তি গাইডলাইন।</li>
            <li><b>মিস্ত্রি:</b> রাজমিস্ত্রি, ইলেকট্রিশিয়ান ও প্লাম্বার।</li>
        </ul>
    </div>
    <div class="chat-container">
        <div class="chat-header">Global Service AI Chat</div>
        <div id="chat-box" class="chat-box"></div>
        <div class="chat-input">
            <input id="user-input" type="text" placeholder="কিছু লিখুন...">
            <button onclick="askBot()">পাঠান</button>
        </div>
    </div>
    <script>
        function askBot() {
            let input = document.getElementById("user-input").value.toLowerCase();
            let box = document.getElementById("chat-box");
            let reply = "দুঃখিত, আমি এটি বুঝতে পারছি না। আপনি কি ডাক্তার, মিস্ত্রি বা শিক্ষা নিয়ে জানতে চান?";
            if (input.includes("ডাক্তার")) reply = "আমাদের কাছে বিশেষজ্ঞ ডাক্তারদের জরুরি নম্বর আছে।";
            else if (input.includes("মিস্ত্রি")) reply = "আমরা দক্ষ রাজমিস্ত্রি ও ইলেকট্রিশিয়ান সরবরাহ করি।";
            else if (input.includes("হ্যালো") || input.includes("hi")) reply = "নমস্কার! আমি কীভাবে সাহায্য করতে পারি?";
            box.innerHTML += "<div><b>আপনি:</b> " + input + "</div>";
            box.innerHTML += "<div style='color: #007bff;'><b>AI:</b> " + reply + "</div>";
            document.getElementById("user-input").value = "";
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
