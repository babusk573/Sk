<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gulabi Babu Global AI</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-card { width: 95%; max-width: 500px; height: 90vh; background: #1e293b; border-radius: 25px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #334155; }
        .header { background: linear-gradient(135deg, #38bdf8, #2563eb); color: white; padding: 20px; text-align: center; }
        .header h2 { margin: 0; font-size: 22px; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #0f172a; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 15px; line-height: 1.5; }
        .user { align-self: flex-end; background: #38bdf8; color: #0f172a; font-weight: bold; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #334155; color: #f1f5f9; border-bottom-left-radius: 2px; }
        .input-area { padding: 15px; background: #1e293b; display: flex; gap: 10px; border-top: 1px solid #334155; }
        input { flex: 1; background: #0f172a; border: 1px solid #334155; padding: 12px; border-radius: 12px; color: white; outline: none; }
        button { background: #38bdf8; color: #0f172a; border: none; padding: 0 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="chat-card">
    <div class="header"><h2>Gulabi Babu AI</h2><p>সব ভাষার উত্তর এখানে</p></div>
    <div id="chat-box"><div class="msg ai">নমস্কার! আমি গুল্যাবি বাবু এআই। যেকোনো প্রশ্ন করুন।</div></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="এখানে লিখুন...">
        <button onclick="askAI()">পাঠান</button>
    </div>
</div>
<script>
    async function askAI() {
        const input = document.getElementById('userInput');
        const chatBox = document.getElementById('chat-box');
        if (!input.value.trim()) return;
        chatBox.innerHTML += `<div class="msg user">${input.value}</div>`;
        const loadingId = "load-" + Date.now();
        chatBox.innerHTML += `<div class="msg ai" id="${loadingId}">Gulabi AI ভাবছি...</div>`;
        const q = input.value;
        input.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;
        
        setTimeout(() => {
            document.getElementById(loadingId).innerHTML = "<b>Gulabi AI:</b> আমি আপনার প্রশ্নটি পেয়েছি। পৃথিবীর সব প্রশ্নের উত্তর সক্রিয় করতে একটি <b>Gemini API Key</b> প্রয়োজন।";
            chatBox.scrollTop = chatBox.scrollHeight;
        }, 1500);
    }
</script>
</body>
</html>
