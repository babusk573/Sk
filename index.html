<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Human Service AI</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        header { background: #1a73e8; color: white; width: 100%; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; }
        .container { padding: 20px; max-width: 500px; width: 90%; margin-top: 30px; }
        .chat-box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; margin-bottom: 15px; }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        #output { margin-top: 25px; padding: 15px; background: #f8f9fa; border-radius: 10px; border-left: 5px solid #1a73e8; text-align: left; line-height: 1.6; font-size: 16px; color: #444; min-height: 50px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <header>গ্লোবাল AI সাহায্যকারী</header>
    <div class="container">
        <div class="chat-box">
            <h3>যেকোনো প্রশ্ন করুন</h3>
            <input type="text" id="userInput" placeholder="এখানে লিখুন...">
            <button onclick="askAI()">জানতে চাই</button>
            <div id="output">আপনার উত্তরের জন্য অপেক্ষা করছি...</div>
        </div>
    </div>
    <script>
        async function askAI() {
            const prompt = document.getElementById('userInput').value;
            const output = document.getElementById('output');
            const apiKey = "AIzaSyD7p-ip6-LbIxbB99ALukVjy-lca5TS42Rg"; 
            if (!prompt.trim()) return alert("দয়া করে কিছু লিখুন!");
            output.innerText = "এআই উত্তর খুঁজছে... একটু অপেক্ষা করুন।";
            try {        const response = await fetch(`https://googleapis.com{apiKey}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });

        const data = await response.json();
        
        if (data.candidates && data.candidates[0].content.parts[0].text) {
            output.innerText = data.candidates[0].content.parts[0].text;
        } else {
            output.innerText = "দুঃখিত, কোনো উত্তর পাওয়া যায়নি।";
        }
    } catch (error) {
        output.innerText = "সার্ভারের সাথে সমস্যা হচ্ছে। আবার চেষ্টা করুন।";
    }
}
</script>
</body>
</html>
